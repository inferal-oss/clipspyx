name: Build Wheels

on:
  push:
  pull_request:

jobs:
  build-wheels:
    name: ${{ matrix.variant }} / ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        variant: [64x, 70x]

    steps:
      - uses: actions/checkout@v4

      - name: Fetch CLIPS source branches
        run: git fetch origin clips-64x:clips-64x clips-70x:clips-70x

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheels
        run: uv run scripts/build-backend.py ${{ matrix.variant }}

      - name: Install and test
        shell: bash
        run: |
          # Install the built wheels into the system Python (set up by setup-python)
          uv pip install --system dist/clipspyx_ffi-*.whl
          uv pip install --system dist/clipspyx_ffi_${{ matrix.variant }}-*.whl
          uv pip install --system ".[dsl]"
          uv pip install --system pytest

          # Run tests from a temp directory to ensure we test the installed package
          mkdir _test_run && cd _test_run
          python -m pytest ../tests/ -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  merge-artifacts:
    name: Merge wheel artifacts
    needs: build-wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*.whl
