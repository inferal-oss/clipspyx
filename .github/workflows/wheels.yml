name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test / ${{ matrix.variant }} / py${{ matrix.python }}
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.14"]
        variant: [64x, 70x]

    steps:
      - uses: actions/checkout@v4

      - name: Fetch CLIPS source branches
        run: git fetch origin clips-64x:clips-64x clips-70x:clips-70x

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install and test
        run: |
          uv sync --extra ${{ matrix.variant }} --extra dsl
          uv run pytest tests/ -v

  build-wheels:
    name: ${{ matrix.variant }} / ${{ matrix.os }} / py${{ matrix.python }}
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        variant: [64x, 70x]

    steps:
      - uses: actions/checkout@v4

      - name: Fetch CLIPS source branches
        run: git fetch origin clips-64x:clips-64x clips-70x:clips-70x

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build wheels
        run: uv run scripts/build-backend.py ${{ matrix.variant }}

      - name: Repair Linux wheels
        if: runner.os == 'Linux'
        run: |
          uv pip install --system auditwheel patchelf
          mkdir -p dist-repaired
          for whl in dist/*linux*.whl; do
            auditwheel repair "$whl" -w dist-repaired/
          done
          rm dist/*linux*.whl
          mv dist-repaired/*.whl dist/

      - name: Install and test
        shell: bash
        run: |
          # Install the built wheels into the system Python (set up by setup-python)
          uv pip install --system dist/clipspyx_ffi-*.whl
          uv pip install --system dist/clipspyx_ffi_${{ matrix.variant }}-*.whl
          uv pip install --system ".[dsl]"
          uv pip install --system pytest

          # Run tests from a temp directory to ensure we test the installed package
          mkdir _test_run && cd _test_run
          python -m pytest ../tests/ -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.variant }}-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  auto-fetch:
    name: auto-fetch / ${{ matrix.variant }}
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [64x, 70x]

    steps:
      - uses: actions/checkout@v4

      # NOTE: no "Fetch CLIPS source branches" step —
      # resolve_clips_source() must auto-fetch from origin

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build and test (auto-fetch)
        run: |
          uv sync --extra ${{ matrix.variant }} --extra dsl
          uv run pytest tests/ -v

  build-root:
    name: Build root package
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build root clipspyx wheel + sdist
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: root-dist
          path: dist/*

  build-sdists:
    name: Build sdists
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build clipspyx-ffi sdist
        run: uv build --package clipspyx-ffi --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdists
          path: dist/*

  merge-artifacts:
    name: Merge all artifacts
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: [build-wheels, build-root, build-sdists]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: root-dist
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdists
          path: dist
          merge-multiple: true

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-rc')
    needs: [merge-artifacts, auto-fetch]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true
          verbose: true

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-rc')
    needs: [merge-artifacts, auto-fetch]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          verbose: true
